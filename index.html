<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/logos/bestellapp_favicon2.svg" type="image/x-icon">
    <script src="./scripts/array.js"></script>
    <script src="./script.js"></script>
    <script src="./scripts/templates_onload.js"></script>
    
    
</head>
<body onload="init()">
    <header>
        <div class="header_elements"><img src="./assets/logos/bestellapp_logo_weiss.svg" alt="bestell_app_logo" class="header_images"></div>
        <div class="header_elements"><img src="./assets/logos/burger_menu.png" alt="menu_img" class="header_images"></div>
    </header>
  
    <main>
       <section class="hero_section">
            <div class="hero_img_container"><img src="./assets/img/hero.png" class="hero_img">
            </div>
            
            <div class="burger_logo"><img src="./assets/logos/logo.svg" alt="logo_bestellapp"></div>
            <div class="lower_hero_part">
                <div class="headline_and_rating_container">
                    <div class="headline"><h1 class="orange_fill">Burger</h1> <h1>House</h1></div>
                    <div class="star_rating"><img src="./assets/img/star_rating.png" alt="star_rating"></div>
                </div>
                <div class="slogan"> <p>The best of Burgers, Pizza and Greens, all in one great place.</p></div>
            </div>     
       </section>
       <section class="dishes_navigation_container">
            <div class="full_width_content">
                <div class="dishes_navigation">
                    <h2>&#10149</h2>
                    <a href="http://"><h2>Burger & Sandwiches </h2></a>
                    <a href="http://"><h2>Pizza (30cm)</h2></a>
                    <a href="http://"><h2>Salate</h2></a>
                </div>
            </div>
       </section>

       <div class="full_width_content">
            <div class="meals_and_basket_wrapper">

                    <section id="category_container">

                    </section>
                    
                    <section class="basket_wrapper" id="my_basket">
                        <div class="headline_basket font_basket">Your Basket </div>
                        <div class="all_basket_meals">
                            <div id="basket_content" class="basket_content">
                                <span class="empty_basket_text">Nothing here yet.<br> Go ahead and choose something <br> delicious!</span>
                                <img src="./assets/buttons/btn_basket_default.svg" alt="basket_img" class="basket_img">
                            </div>
                        </div>
                        <div id="basket_costs">
                        </div>
                    </section>
            </div>
        </div>

     <dialog class="order_confirmed_dialog" id="order_confirmed_dialog">
                        <button onclick="closeDialog()" class="close_dialog_btn">X</button>
                        <div class="order_confirmed_img_and_text_container">
                            <div class="order_confirmed_img_container"><img src="./assets/img/order_confirmed_caddy.png" class="order_confirmed_img" alt="caddy_on_the_way"></div>
                            <div class="order_confirmed_text"><h1>Order confirmed!</h1><br>
                                <h3>Your food is in the way!</h3>
                            </div>
                        </div>
    </dialog>   

    </main>
    <footer>
        <div class="footer_elements">
        <div class="copyright_elements">
                <div class="footer_link">
                    <img src="./assets/img/copyright.svg" alt="copyright" class="copyright_img">
                    <p>2025 BurgerHouse</p>
                </div>
        </div>
        <a href="http://" class="footer_link">Imprint</a>
        <a href="http://" class="footer_link">Cookie Preferences</a>
        </div>
    </footer>
    
</body>
<script src="./scripts/templates_onclick.js"></script>
</html>
