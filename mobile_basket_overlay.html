<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House</title>
    <link rel="stylesheet" href="./templates.css/basket.css"> 
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./templates.css/fonts.css">
    <link rel="shortcut icon" href="./assets/logos/bestellapp_favicon2.svg" type="image/x-icon">
    <script src="./scripts/array.js"></script>
    <script src="./script.js"></script>
    <script src="./scripts/templates_onload.js"></script>
    
    
</head>
<body onload="init()">
    <header>
        <div class="header_elements">
            <img src="./assets/logos/bestellapp_logo_weiss.svg" alt="bestell_app_logo" class="header_images">
            <img src="./assets/logos/burger_menu.png" alt="menu_img" class="header_images">
        </div>
    </header>
  
    <main>
      <section class="basket_wrapper" id="my_basket">
                        <div class="headline_basket font_basket">Your Basket </div>
                        <div class="all_basket_meals">
                            <div id="basket_content" class="basket_content">
                                <span class="empty_basket_text">Nothing here yet.<br> Go ahead and choose something <br> delicious!</span>
                                <img src="./assets/buttons/btn_basket_default.svg" alt="basket_img" class="basket_img">
                            </div>
                        </div>
                        <div id="basket_costs">
                        </div>
                    </section>
         

    </main>
    <footer>
        <div class="footer_elements">
        <div class="copyright_elements">
                <div class="footer_link">
                    <img src="./assets/img/copyright.svg" alt="copyright" class="copyright_img">
                    <p>2025 BurgerHouse</p>
                </div>
        </div>
        <a href="http://" class="footer_link">Imprint</a>
        <a href="http://" class="footer_link">Cookie Preferences</a>
        </div>
    </footer>
    
    <div class="nav_bar_mobile">
        <button class="nav_bar_mobile_btn"><img src="./assets/buttons/btn_home_default.svg" alt="home"></button>
        <button class="nav_bar_mobile_btn"><img src="./assets/buttons/btn_profile_default.svg" alt="profile"></button>
        <button onclick="showMobileBasket()" class="nav_bar_mobile_btn" id="mobile_basket_btn"><img src="./assets/logos/takeout_dining_2.svg" alt="favicon_bestellapp"></button>
        <button class="nav_bar_mobile_btn"><img src="./assets/buttons/basket_deafult.svg" alt="basket"></button>
    </div>
    
</body>
<script src="./scripts/templates_onclick.js"></script>
</html>
